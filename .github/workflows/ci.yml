name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        name: Check out repository

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.x
          cache: false

      - uses: golangci/golangci-lint-action@v8
        name: Install golangci-lint
        with:
          version: latest

  test:
    name: Test
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.x
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run Tests
        run: |
          go test -coverprofile coverage.out $(go list ./... | grep -v '/docs' | grep -v '/mocks' | grep -v '/entity') 
          go tool cover -func=coverage.out

      - name: Generate GitHub Summary
        run: |
          echo "### Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
          PERCENTAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}')
          echo "Total Coverage: **$PERCENTAGE**" >> $GITHUB_STEP_SUMMARY

      - name: Build
        run: go build -o ./bin/app ./cmd/go-boilerplate-rest-api-chi

      - name: Run Govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  build-docker:
    name: Docker Build
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build Docker Image
        run: |
          docker build -f docker/Dockerfile -t go-boilerplate-rest-api-chi:test .
